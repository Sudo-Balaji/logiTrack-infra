# Source: grafana/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: obs-shared
  labels:
    helm.sh/chart: grafana-10.5.15
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/version: "12.3.1"
data:
  
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = ''
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      name: Prometheus
      type: prometheus
      url: http://prometheus-server.obs-shared.svc.cluster.local:80
    - access: proxy
      name: Loki
      type: loki
      url: http://loki-gateway.obs-shared.svc.cluster.local:80
    - access: proxy
      name: Tempo
      type: tempo
      url: http://tempo.obs-shared.svc.cluster.local:3200
    - access: proxy
      name: Pyroscope
      type: grafana-pyroscope-datasource
      url: http://pyroscope.obs-shared.svc.cluster.local:4040
