# VALK-401: Alloy Deployment Configuration

# Render command:
# helm template alloy grafana/alloy --namespace logitrack-app -
# f clusters/aks-app-01/alloy/values.yaml > rendered-alloy.yaml

# VALK-401: Alloy Deployment Configuration
alloy:
  controller:
    type: daemonset

  rbac:
    create: true

  # VALK-403: Open the Receiving Docks for Java Agents
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: pyroscope
      port: 4040
      targetPort: 4040
      protocol: TCP

  # VALK-402: Native shortcut to grant Host access to log files
  mounts:
    varlog: true

  # VALK-402, 403, 404: The Unified Telemetry Pipeline
  configMap:
    content: |
      logging {
        level = "info"
        format = "logfmt"
      }

      // ==========================================
      // 1. KUBERNETES DISCOVERY
      // Find all pods on this local Azure node
      // ==========================================
      discovery.kubernetes "local_pods" {
        role = "pod"
        selectors {
          role = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      // ==========================================
      // 2. METRICS PIPELINE (PULL)
      // Look for the Prometheus annotations!
      // ==========================================
      discovery.relabel "metrics_targets" {
        targets = discovery.kubernetes.local_pods.targets
        rule {
          action = "keep"
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex = "true"
        }
        rule {
          action = "replace"
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label = "__metrics_path__"
        }
        rule {
          action = "replace"
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          separator = ":"
          regex = "([^:]+)(?::\\d+)?;(\\d+)"
          target_label = "__address__"
          replacement = "$1:$2"
        }
      }

      prometheus.scrape "app_metrics" {
        targets = discovery.relabel.metrics_targets.output
        forward_to = [prometheus.remote_write.backend.receiver]
      }

      // ==========================================
      // 3. LOGS PIPELINE (PULL)
      // Read the physical files mounted from the Host
      // ==========================================
      discovery.relabel "log_targets" {
        targets = discovery.kubernetes.local_pods.targets
        rule {
          action = "replace"
          source_labels = ["__meta_kubernetes_namespace"]
          target_label = "namespace"
        }
        rule {
          action = "replace"
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label = "app"
        }
      }

      loki.source.kubernetes "app_logs" {
        targets = discovery.relabel.log_targets.output
        forward_to = [loki.write.backend.receiver]
      }

      // ==========================================
      // 4. TRACES & PROFILES PIPELINE (PUSH)
      // Receive payloads from the Java Agents
      // ==========================================
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      pyroscope.receive_http "default" {
        http { 
          listen_address = "0.0.0.0"
          listen_port = 4040 
        }
        forward_to = [pyroscope.write.backend.receiver]
      }

      // ==========================================
      // 5. EGRESS / REMOTE WRITE (VALK-404)
      // Ship everything to the obs-shared cluster
      // ==========================================
  
      prometheus.remote_write "backend" {
        endpoint { url = "http://10.0.86.50:80/api/v1/write" }
      }

      loki.write "backend" {
        endpoint { url = "http://10.0.224.67:80/loki/api/v1/push" }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "http://10.0.190.172:4317"
          tls { insecure = true }
        }
      }

      pyroscope.write "backend" {
        endpoint { url = "http://10.0.28.161:4040" }
      }