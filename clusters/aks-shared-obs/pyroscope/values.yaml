# INFRASTRUCTURE SETTINGS

# Render command: helm template my-pyroscope grafana/pyroscope --namespace obs-shared -f clusters/aks-shared-obs/pyroscope/values.yaml > rendered-pyroscope.yaml


deploymentMode: SingleBinary

all:
  replicas: 1

  # The PVC (persistent volume for temporary data)
  persistentVolume:
    enabled: true
    size: 5Gi

  # Inject the Azure Storage Key as an Environment Variable
  # Since Pyroscope chart structure is different, we inject env vars here at 'all' level
  env:
    - name: AZURE_STORAGE_KEY
      valueFrom:
        secretKeyRef:
          name: obs-shared-secrets
          key: storage-account-key

# Pyroscope Application Configuration (passed to the container)
# Just like we do for Loki and Tempo, nest everything under pyroscope: key
pyroscope:

  # Inject the Azure Storage Key as an Environment Variable
  # Note: The pyroscope chart expects extraEnvVars to be a dict/object, not a list like Kubernetes env
  # We need to use a separate envFrom or pass it via the config
  # For now, Pyroscope will read the storage key from the file: /mnt/secrets-store/storage-account-key
  
  # This tells Pyroscope to expand environment variables in the config file
  # So when Pyroscope sees references in the config, it will expand them
  extraArgs:
    config.expand-env: "true"

  # Mount the CSI secret store so Kubernetes can inject the Azure storage key
  # These MUST be under pyroscope: for proper merge into the StatefulSet template
  extraVolumeMounts:
    - name: secrets-store-inline
      mountPath: "/mnt/secrets-store"
      readOnly: true

  # CSI Bridge Volume Definition
  # These MUST be under pyroscope: for proper merge into the StatefulSet volumes section
  extraVolumes:
    - name: secrets-store-inline
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "azure-kv-bridge"
        nodePublishSecretRef:      
          name: kvcreds

  # --- AZURE ILB CONFIGURATION ---
  # THE FIX: It MUST go here, exactly under the 'pyroscope:' key.
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  # -------------------------------